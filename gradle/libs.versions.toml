[versions]
# Spring
spring-boot = "4.0.4"
spring-dependency-management = "1.1.7"

# Runtime and infrastructure
lombok = "1.18.44"
redisson = "4.3.0"

# Build tooling
spotless = "8.3.0"

[libraries]
# Spring Boot starters
spring-boot-starter = { module = "org.springframework.boot:spring-boot-starter", version.ref = "spring-boot" }
spring-boot-starter-web = { module = "org.springframework.boot:spring-boot-starter-web", version.ref = "spring-boot" }
spring-boot-starter-validation = { module = "org.springframework.boot:spring-boot-starter-validation", version.ref = "spring-boot" }
spring-boot-starter-data-jdbc = { module = "org.springframework.boot:spring-boot-starter-data-jdbc", version.ref = "spring-boot" }
spring-boot-starter-flyway = { module = "org.springframework.boot:spring-boot-starter-flyway", version.ref = "spring-boot" }
spring-boot-starter-test = { module = "org.springframework.boot:spring-boot-starter-test", version.ref = "spring-boot" }

# Database and migrations
flyway-database-postgresql = { module = "org.flywaydb:flyway-database-postgresql" }
postgresql = { module = "org.postgresql:postgresql" }

# Utilities
lombok = { module = "org.projectlombok:lombok", version.ref = "lombok" }

# Distributed locking
redisson = { module = "org.redisson:redisson", version.ref = "redisson" }

[plugins]
# Spring plugins
spring-boot = { id = "org.springframework.boot", version.ref = "spring-boot" }
spring-dependency-management = { id = "io.spring.dependency-management", version.ref = "spring-dependency-management" }

# Formatting plugins
spotless = { id = "com.diffplug.spotless", version.ref = "spotless" }
